services:
  frontend:
    build:
      context: ./sol-test-ng
      dockerfile: Dockerfile
    environment:
      PORT: 80
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

  backend:
    build:
      context: ./sol-test-api
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    networks:
      - app

networks:
  app:
    driver: bridge