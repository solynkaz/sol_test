services:
  frontend:
    build:
      context: ./sol-test-ng
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

  backend:
    build:
      context: ./sol-test-api
      dockerfile: Dockerfile
    environment:
      PORT: 8080
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

networks:
  app:
    driver: bridge